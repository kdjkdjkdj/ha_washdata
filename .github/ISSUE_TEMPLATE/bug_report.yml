name: Bug Report
description: Create a report to help us improve WashData
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

        Please complete **all required fields**. For fields that don't apply to your specific bug (e.g. device details for a purely UI issue), enter `N/A` - but do not skip them without reason. Issues missing key information will be automatically flagged and may be closed without investigation.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before You Submit
      description: Please confirm all of the following before opening this issue.
      options:
        - label: I have searched the [existing issues](https://github.com/3dg1luk43/ha_washdata/issues) and this is not a duplicate.
          required: true
        - label: I have provided logs or error evidence in the field below (debug logs, error messages, warnings, or any relevant output), or entered `N/A` with a reason if genuinely not applicable.
          required: true
        - label: I have filled in all applicable fields with real values and used `N/A` only where the field is genuinely irrelevant to my bug.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I engage the flux capacitor, the washing machine assumes it's a coffee maker..."
    validations:
      required: true

  - type: dropdown
    id: device_type
    attributes:
      label: Device Type
      description: What type of appliance is this bug related to?
      options:
        - Washing Machine
        - Dryer
        - Washer-Dryer Combo
        - Dishwasher
        - Air Fryer
        - Bread Maker
        - Pump / Sump Pump
        - Other (Advanced)
        - Coffee Machine (deprecated)
        - Electric Vehicle (EV) (deprecated)
        - Heat Pump (deprecated)
        - Oven (deprecated)
        - Other / Not applicable
    validations:
      required: true

  - type: input
    id: device_brand_model
    attributes:
      label: Device Brand & Model
      description: The brand and model number of your appliance (e.g. "Miele W1 WCG370"). Enter `N/A` if this bug is not related to a specific device.
      placeholder: "Brand Model Number or N/A"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: WashData Integration Version
      description: >
        What version of WashData are you running? (found in HACS or Settings → Integrations).
        Check the [Releases page](https://github.com/3dg1luk43/ha_washdata/releases) to see if a newer version is available — bugs already fixed in a later release won't be re-investigated.
      placeholder: "vX.Y.Z"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: What version of Home Assistant Core are you running? (found in Settings → About)
      placeholder: "2024.12.0"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: debug_log
    attributes:
      label: Logs / Error Evidence
      description: |
        **This is required.** Paste any relevant logs, error messages, or console output here. This does not have to be debug-level logs — any evidence of what went wrong is helpful: a single error line from the HA logbook, a warning trace, or a full debug log session. Paste whatever you have.

        > ⚠️ **Debug logs and the HA Diagnostics export are two different things.**
        > - **Logs** = text output from `Settings → System → Logs`. Paste short excerpts directly; attach long files.
        > - **Diagnostics export** = the JSON file from `Settings → Devices → your device → Download Diagnostics`. Always attach as a file — never paste inline.

        **To get the most useful logs**, enable debug logging by adding this to your `configuration.yaml` and restarting HA:
        ```yaml
        logger:
          default: info
          logs:
            custom_components.ha_washdata: debug
        ```
        Then reproduce the bug and collect the output from `Settings → System → Logs`.

        - **Short output (< ~50 lines):** paste directly below.
        - **Long output:** download via `Settings → System → Logs → Download full log` and attach as a file.

        If you only have a brief error line or warning from the HA logbook, paste that — it is far better than nothing.

        > **Tip:** Filter live logs by `ha_washdata` under `Settings → System → Logs` to quickly find relevant lines.
      placeholder: "Paste log output or error messages here, or describe what file(s) you have attached above..."
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context about the problem (screenshots, related automations, unusual HA setup, etc.)
    validations:
      required: false

  - type: checkboxes
    id: pr_intention
    attributes:
      label: Contributing a Fix
      description: >
        If you intend to submit a PR fixing this bug yourself, check the box below.
        The maintainer will review and — if approved — add the `accepted` label to this issue.
        **You must wait for that label before opening a PR**, otherwise the PR will be closed automatically.
      options:
        - label: I plan to submit a PR fixing this and will wait for the `accepted` label before opening it
          required: false
