name: Feature Request
description: Suggest an idea for WashData
title: "[FR] "
labels: ["feature request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!

        Please fill in only the sections that are relevant to your request. Fields marked as required must be completed - others can be skipped if they don't apply.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before You Submit
      options:
        - label: I have searched the [existing issues](https://github.com/3dg1luk43/ha_washdata/issues) and this feature has not already been requested.
          required: true
        - label: This request is specifically about WashData, not Home Assistant core or a third-party integration.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve, or what use case does it enable? Be specific.
      placeholder: "When my washing machine finishes, I have no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you want to happen. Be as concrete as possible.
    validations:
      required: true

  - type: dropdown
    id: device_type
    attributes:
      label: Related Device Type
      description: Is this feature specific to a particular appliance type, or general?
      options:
        - General / Not device-specific
        - Washing Machine
        - Dryer
        - Washer-Dryer Combo
        - Dishwasher
        - Air Fryer
        - Bread Maker
        - Pump / Sump Pump
        - Other (Advanced)
        - Coffee Machine (deprecated)
        - Electric Vehicle (EV) (deprecated)
        - Heat Pump (deprecated)
        - Oven (deprecated)
        - Other
    validations:
      required: true

  - type: input
    id: device_brand_model
    attributes:
      label: Device Brand & Model (if device-specific)
      description: If this feature is only relevant for a specific device, provide the brand and model. Otherwise leave blank.
      placeholder: "e.g. Miele W1 WCG370 - or leave blank"
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you've tried, or alternative approaches you considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, links to related issues, or any other relevant context.
    validations:
      required: false

  - type: checkboxes
    id: pr_intention
    attributes:
      label: Contributing an Implementation
      description: >
        If you intend to implement this feature yourself and submit a PR, check the box below.
        The maintainer will review and — if approved — add the `accepted` label to this issue.
        **You must wait for that label before opening a PR**, otherwise the PR will be closed automatically.
      options:
        - label: I plan to submit a PR implementing this and will wait for the `accepted` label before opening it
          required: false
