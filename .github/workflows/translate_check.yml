# This workflow previously auto-translated new English keys via GoogleTranslator (deep-translator).
# It is DISABLED as of 0.5.1: community translations are now submitted through GitLocalize
# (https://gitlocalize.com/repo/10819), which syncs new keys to translators automatically.
# New keys added by the maintainer are translated via Claude subagents with domain context
# (see CLAUDE.md "Translation maintenance"). Machine translation via this pipeline is banned.
#
# The workflow_dispatch trigger is retained as an emergency escape hatch only.
# Do NOT re-enable the push trigger without discussing the translation workflow change first.

name: '🌐 Auto Translate (disabled)'

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # We need at least 2 commits to diff against HEAD~1

      - name: Run Translation Script
        uses: 3dg1luk43/ha_integration_translator/.github/actions/translate@3770f93dbbf81ea4139acd1e0ba8a5386d345cec
        with:
          translations_dir: custom_components/ha_washdata/translations
          all_languages: "true"
          card_file: custom_components/ha_washdata/www/ha-washdata-card.js

      - name: Check for changes
        id: git_diff
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Mint identity token
        id: 'mint_identity_token'
        if: steps.git_diff.outputs.changes_detected == 'true'
        uses: 'actions/create-github-app-token@v1'
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'

      - name: Create Pull Request
        if: steps.git_diff.outputs.changes_detected == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN }}
          commit-message: "chore: update translations [skip ci]"
          title: "🌐 Update Translations"
          body: |
            Automated translation updates triggered by changes to canonical English entries.

            This PR updates:
            - `custom_components/ha_washdata/translations/*.json`
            - `custom_components/ha_washdata/www/ha-washdata-card.js` (`TRANSLATIONS` object)

            Translation engine: `deep-translator` (GoogleTranslator).
          branch: "chore/auto-translate"
          delete-branch: true
          base: ${{ github.ref_name }}
